name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  syntax:
    name: Sintaxis (node --check + bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check en cada archivo JS del server (sin node_modules ni webapp)
        run: |
          find server -name '*.js' -not -path 'server/node_modules/*' -not -path 'server/src/webapp/*' \
            -print0 | xargs -0 -n1 node --check
      - name: bash -n en deploy-linux.sh y compilar-apk.sh
        run: |
          bash -n deploy-linux.sh
          [ -f compilar-apk.sh ] && bash -n compilar-apk.sh || true
      - name: python3 -m py_compile en dashboard.py
        run: python3 -m py_compile dashboard.py

  test:
    name: Tests (Postgres real)
    runs-on: ubuntu-latest
    needs: syntax
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pedidosbot
          POSTGRES_PASSWORD: pedidosbot
          POSTGRES_DB: supermercado
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PG_HOST: 127.0.0.1
      PG_PORT: 5432
      PG_DATABASE: supermercado
      PG_USER: pedidosbot
      PG_PASSWORD: pedidosbot
      JWT_SECRET: ci-test-secret
      API_KEY: ci-test-api-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      # pg_dump/pg_restore (backup-scheduler.test.js) -- no siempre viene
      # preinstalado en el runner.
      - name: Instalar cliente de Postgres (pg_dump/pg_restore)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
      # npm install, no npm ci: el cutover a Postgres cambio las
      # dependencias (afuera better-sqlite3, adentro pg/ioredis/ejs) y el
      # package-lock.json committeado todavia no se regenero en una maquina
      # real -- npm install lo reconcilia solo. Una vez alguien corra
      # `npm install` en un entorno normal y commitee el lockfile actualizado,
      # esto puede volver a npm ci para instalaciones reproducibles estrictas.
      - name: Instalar dependencias del server
        working-directory: server
        run: npm install
      # El service container de Postgres ya espera su propio healthcheck
      # (pg_isready) antes de que arranquen los steps -- no hace falta
      # esperar de nuevo aca.
      - name: npm test
        working-directory: server
        run: npm test
